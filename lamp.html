<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enriched Lamp Login UI</title>
    <style>
        /* Base Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* The Bedroom Environment */
        body {
            height: 100vh;
            width: 100vw;
            background-color: #050505;
            background-image: url('https://images.unsplash.com/photo-1531835551805-16d89408d511?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-blend-mode: multiply;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.5s ease;
            position: relative;
        }

        /* Ambient Room Light */
        .room-light {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150vw;
            height: 150vh;
            background: radial-gradient(circle, rgba(255,160,50,0.1) 0%, rgba(0,0,0,0) 60%);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            z-index: 1;
        }

        .scene-container {
            display: flex;
            align-items: center;
            gap: 70px;
            z-index: 2;
            position: relative;
            transform: translateX(-50px);
        }

        /* --- LAMP CSS --- */
        .lamp-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -100px;
        }

        .lampshade {
            width: 160px;
            height: 110px;
            background-color: #1a1a1a;
            clip-path: polygon(30% 0, 70% 0, 100% 100%, 0 100%);
            position: relative;
            z-index: 3;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }

        .lamp-pole {
            width: 8px;
            height: 220px;
            background: linear-gradient(to right, #111, #3a3a3a, #111);
            z-index: 2;
        }

        .lamp-base {
            width: 110px;
            height: 18px;
            background: linear-gradient(to right, #111, #4a4a4a, #111);
            border-radius: 12px 12px 0 0;
            z-index: 2;
        }

        /* The Pull Thread */
        .thread-container {
            position: absolute;
            top: 110px;
            right: 45px;
            z-index: 4;
            cursor: pointer;
            padding: 10px;
        }

        .thread {
            width: 2px;
            height: 70px;
            background-color: #aaa;
            margin: 0 auto;
            transition: transform 0.15s ease-out;
        }

        .thread-bob {
            width: 12px;
            height: 12px;
            background-color: #d4af37;
            border-radius: 50%;
            margin-left: -5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.6);
            transition: transform 0.15s ease-out;
        }

        .thread-container.pulled .thread { transform: scaleY(1.4); transform-origin: top; }
        .thread-container.pulled .thread-bob { transform: translateY(28px); }

        /* --- ENRICHED LOGIN FORM CSS --- */
        .login-card {
            width: 380px;
            padding: 45px 35px;
            background: rgba(30, 20, 10, 0.45); /* Sepia-tinted glass */
            border: 2px solid transparent;
            border-radius: 24px; /* Smoother, larger corners */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            opacity: 0;
            transform: translateX(-40px) scale(0.95);
            pointer-events: none;
            transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
        }

        .login-card h2 {
            color: #ffffff;
            margin-bottom: 30px;
            text-align: center;
            font-size: 26px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Input Group with Icons */
        .input-group {
            position: relative;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 0 16px;
            margin-bottom: 18px;
            transition: border-color 0.3s;
        }

        .input-group:focus-within {
            border-color: #ffd89b;
        }

        .input-icon {
            width: 18px;
            height: 18px;
            stroke: #b0b0b0;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            margin-right: 12px;
        }

        .input-group input {
            flex: 1;
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 15px;
            padding: 16px 0;
            outline: none;
        }

        .input-group input::placeholder {
            color: #b0b0b0;
        }

        /* Gradient Pill Button */
        .login-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #fcd090, #c86924);
            border: none;
            border-radius: 30px; /* Pill shape */
            color: #222;
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s, filter 0.2s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .btn-icon {
            width: 18px;
            height: 18px;
            stroke: #222;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        /* Bottom Links */
        .forgot-link {
            text-align: right;
            color: #cccccc;
            text-decoration: none;
            font-size: 13px;
            margin-top: 15px;
            margin-bottom: 25px;
            transition: color 0.2s;
        }

        .create-link {
            text-align: center;
            color: #cccccc;
            text-decoration: none;
            font-size: 13px;
            transition: color 0.2s;
        }

        .forgot-link:hover, .create-link:hover {
            color: #ffffff;
        }

        /* --- "ON" STATE STYLES --- */
        body.light-on {
            background-color: #1a1a1a;
        }

        body.light-on .room-light {
            opacity: 1;
        }

        body.light-on .lampshade {
            background-color: #ffecd2;
            box-shadow: 0 40px 100px 30px rgba(255, 180, 70, 0.7), 
                        inset 0 -25px 40px rgba(255, 140, 0, 0.6);
        }

        body.light-on .login-card {
            opacity: 1;
            transform: translateX(0) scale(1);
            pointer-events: auto;
            /* The intense matching glow from the image */
            border: 2px solid rgba(255, 190, 100, 0.8);
            box-shadow: 0 0 25px 2px rgba(255, 160, 40, 0.6), 
                        0 0 70px 15px rgba(255, 130, 0, 0.25),
                        inset 0 0 20px rgba(255, 200, 100, 0.1);
        }
    </style>
</head>
<body>

    <div class="room-light"></div>

    <div class="scene-container">
        <!-- Interactive Lamp -->
        <div class="lamp-wrapper">
            <div class="lampshade"></div>
            <div class="lamp-pole"></div>
            <div class="lamp-base"></div>
            
            <div class="thread-container" id="pull-cord">
                <div class="thread"></div>
                <div class="thread-bob"></div>
            </div>
        </div>

        <!-- Enriched Glowing Interface -->
        <div class="login-card">
            <h2>Welcome Back</h2>
            
            <div class="input-group">
                <!-- Inline SVG User Icon -->
                <svg class="input-icon" viewBox="0 0 24 24">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <input type="text" placeholder="Username">
            </div>

            <div class="input-group">
                <!-- Inline SVG Lock Icon -->
                <svg class="input-icon" viewBox="0 0 24 24">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                <input type="password" placeholder="Password">
            </div>

            <button class="login-btn">
                LOGIN
                <!-- Inline SVG Arrow Icon -->
                <svg class="btn-icon" viewBox="0 0 24 24">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </button>

            <a href="#" class="forgot-link">Forgot Password?</a>
            <a href="#" class="create-link">Create an account</a>
        </div>
    </div>

    <!-- Hidden mechanical click audio -->
    <audio id="click-sound" src="https://actions.google.com/sounds/v1/foley/mechanical_switch_click.ogg" preload="auto"></audio>

    <script>
        const pullCord = document.getElementById('pull-cord');
        const clickSound = document.getElementById('click-sound');
        const body = document.body;

        // Mouse Events
        pullCord.addEventListener('mousedown', function() {
            pullCord.classList.add('pulled');
            clickSound.currentTime = 0; 
            clickSound.play();

            setTimeout(() => {
                body.classList.toggle('light-on');
            }, 100);
        });

        window.addEventListener('mouseup', function() {
            pullCord.classList.remove('pulled');
        });

        // Touch Events for Mobile
        pullCord.addEventListener('touchstart', function(e) {
            e.preventDefault(); 
            pullCord.classList.add('pulled');
            clickSound.currentTime = 0;
            clickSound.play();
            
            setTimeout(() => {
                body.classList.toggle('light-on');
            }, 100);
        });

        window.addEventListener('touchend', function() {
            pullCord.classList.remove('pulled');
        });
    </script>
</body>
</html>
