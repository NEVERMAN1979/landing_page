<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- The glowing element that tracks the mouse -->
    <div id="glow-blob"></div>
    <!-- The frosted glass blur layer -->
    <div id="blur-layer"></div>

    <!-- Your actual landing page content -->
    <div class="content-card">
        <h1>Project Title</h1>
        <p>A cutting-edge solution hosted seamlessly on GitHub Pages. Experience the interactive design by moving your cursor.</p>
        <div class="buttons">
            <a href="https://github.com/yourusername/yourrepo" class="btn primary">View on GitHub</a>
            <a href="#" class="btn secondary">Documentation</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
